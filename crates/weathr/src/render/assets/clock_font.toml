# weathr clock font
#
# Format:
# - height: number of rows each glyph must contain.
# - spacing: spaces inserted between normal adjacent glyphs.
# - separator_spacing: spaces inserted around separator glyphs such as ":".
# - [glyphs]: quoted single-character keys mapped to exactly `height` strings.
#
# Replace glyph strings to change the clock style. Keep all glyphs at the
# configured height.

name = "roman-clock"
height = 7
spacing = 1
separator_spacing = 5

[glyphs]
"0" = [
  "  .oooo.",
  " d8P'`Y8b",
  "888    888",
